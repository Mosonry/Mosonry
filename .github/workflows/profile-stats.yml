name: Update Stats Images

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Create Stats Branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b stats 2>/dev/null || git checkout stats
          
      - name: Download Stats Image
        run: |
          curl -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=default&hide_border=true&title_color=2563EB&icon_color=2563EB"
          
      - name: Download Streak Image
        run: |
          curl -o streak-stats.svg "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=default&hide_border=true&fire=2563EB&ring=2563EB"
          
      - name: Commit and Push
        run: |
          git add github-stats.svg streak-stats.svg
          git commit -m "Update stats [skip ci]" || echo "No changes"
          git push origin stats --force
