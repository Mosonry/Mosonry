name: Generate GitHub Profile Stats Cards

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点运行（北京时间8点）
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      # 生成主要统计数据
      - name: Generate GitHub Readme Stats
        uses: DenverCoder1/github-readme-stats@main
        with:
          user: ${{ github.repository_owner }}
          output_filename: github-stats.svg
          show_icons: true
          hide_border: true
          title_color: '2563EB'
          icon_color: '2563EB'
          theme: default
          
      # 生成连续打卡统计
      - name: Generate Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: ${{ github.repository_owner }}
          output_filename: streak-stats.svg
          hide_border: true
          fire: '2563EB'
          ring: '2563EB'
          theme: default
          
      # 提交到 stats 分支
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b stats || git checkout stats
          git add github-stats.svg streak-stats.svg
          git commit -m "Update stats cards [skip ci]" || echo "No changes"
          git push origin stats --force
